<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voyagéàmadagascar.com</title>
    <link rel="stylesheet" href="Style_Accueil.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inspiration&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <ul class="ul_header">
          <li class="li_header"></li>
          <li class="li_header">Circuit</li>
          <li class="li_header">A propos de nous</li>
          <img src="/Icône/image.png" alt="" class="icone_image" />
          <li class="li_header">Nos Offres</li>
          <li class="li_header">Services</li>
          <button class="bouton_se_connecter">Se Connecter</button>
        </ul>
      </nav>

      <div class="div_header">
        <h2 class="h2_header">Le meilleur Agence de Voyage à Madagascar</h2>
        <h1 id="inspiration-regular" class="h1_header">
          Faire un voyage libre
        </h1>

        <div class="div_search_header">
          <input
            type="search"
            name="rechercher"
            id="id_input_search"
            class="class_input_search"
            placeholder="Fianarantsoa , Toamasiana , Majunga"
          />
          <button class="bouton_search_header">
            <img src="/Icône/chercher.png" alt="" class="icone" />
            Explorer
          </button>
        </div>

        <div class="div_boutons_header">
          <button class="bouton_dans_header">Fianarantsoa</button>
          <button class="bouton_dans_header">Toamasina</button>
          <button class="bouton_dans_header">Antsirabe</button>
          <button class="bouton_dans_header">Majunga</button>
          <button class="bouton_dans_header">Toliara</button>
        </div>

        <button class="bouton_dans_header bouton_m_inspirer">
          <img src="/Icône/idee.png" alt="" class="icone" />
          <pre> M'inspirer</pre>
        </button>
      </div>
    </header>
  </body>
</html>
